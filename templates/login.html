<!DOCTYPE html>
<html>
<head>
    <title>CSC Billing ERP - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7f6;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Premium Floating Login Card Layout */
        .login-container {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-top: 5px solid #0066cc; /* Matching framework branding color */
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            font-size: 26px;
            font-weight: bold;
            color: #212529;
            margin-bottom: 5px;
        }

        .login-header p {
            font-size: 14px;
            color: #6c757d;
            margin: 0;
        }

        .form-label {
            font-size: 15px;
            font-weight: bold;
            color: #495057;
            margin-bottom: 8px;
        }

        .form-control {
            font-size: 16px;
            padding: 12px 15px;
            border: 2px solid #ced4da;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #0066cc;
            box-shadow: 0 0 0 0.25rem rgba(0, 102, 204, 0.15);
        }

        /* Control Trigger Action Button */
        .btn-login {
            background: #0066cc;
            color: white;
            font-weight: bold;
            font-size: 18px;
            padding: 12px;
            border-radius: 6px;
            border: none;
            width: 100%;
            transition: background 0.2s;
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.15);
        }

        .btn-login:hover {
            background: #0052a3;
            color: white;
        }
    </style>
</head>
<body>

<div class="login-container mx-3">
    <div class="login-header">
        <h2>CSC Billing ERP</h2>
        <p>Sign in to access your dashboard panel</p>
    </div>

    <form method="POST">
        <div class="mb-4">
            <label class="form-label">Username</label>
            <input 
                type="text" 
                name="username" 
                class="form-control" 
                placeholder="Enter username" 
                autocomplete="off"
                required>
        </div>

        <div class="mb-4">
            <label class="form-label">Password</label>
            <input 
                type="password" 
                name="password" 
                class="form-control" 
                placeholder="Enter password" 
                required>
        </div>

        <div class="pt-2">
            <button type="submit" class="btn btn-login">Login Securely</button>
        </div>
    </form>
</div>

</body>
</html>
