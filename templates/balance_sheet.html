<!DOCTYPE html>
<html>
<head>
    <title>Balance Sheet</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            margin:0;
        }

        .header{
            background:#0066cc;
            color:white;
            text-align:center;
            padding:20px;
        }

        table{
            width:95%;
            margin:20px auto;
            border-collapse:collapse;
            background:white;
        }

        th{
            background:#0066cc;
            color:white;
            padding:10px;
        }

        td{
            padding:10px;
            border:1px solid #ccc;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        .totalbox{
            width:300px;
            margin:20px auto;
            background:white;
            padding:20px;
            text-align:center;
            border-radius:10px;
            box-shadow:0 0 10px #ccc;
            font-size:24px;
            font-weight:bold;
        }

        .btn{
            display:block;
            width:150px;
            margin:20px auto;
            text-align:center;
            background:#0066cc;
            color:white;
            padding:10px;
            text-decoration:none;
            border-radius:5px;
        }

    </style>

</head>

<body>

<div class="header">
    <h1>Balance Sheet</h1>
</div>

<div class="totalbox">
    Total Collection<br><br>
    ₹ {{ total }}
</div>

<table>

<tr>
    <th>Bill No</th>
    <th>Date</th>
    <th>Customer</th>
    <th>Total Amount</th>
</tr>

{% for row in data %}

<tr>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>₹ {{ row[6] }}</td>
</tr>

{% endfor %}

</table>

<button onclick="history.back()" class="btn">
    Back
</button>

</body>
</html>
