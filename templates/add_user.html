<!DOCTYPE html>
<html>
<head>
<title>Add User</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f4f4;
}

.header{
    background:#0d6efd;
    color:white;
    padding:25px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

.form-box{
    width:500px;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

</style>

</head>
<body>

<div class="header">
    Add User
</div>

<div class="form-box">

<form method="POST">

<div class="mb-3">
    <label class="form-label">
        Username
    </label>

    <input
        type="text"
        name="username"
        class="form-control"
        required>
</div>

<div class="mb-3">

    <label class="form-label">
        Password
    </label>

    <div class="input-group">

        <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            required>

        <button
            type="button"
            class="btn btn-outline-secondary"
            onclick="togglePassword()">

            👁

        </button>

    </div>

</div>

<div class="mb-3">

    <label class="form-label">
        Role
    </label>

    <select
        name="role"
        class="form-select">

        <option value="ADMIN">
            ADMIN
        </option>

        <option value="STAFF" selected>
            STAFF
        </option>

    </select>

</div>

<button
    type="submit"
    class="btn btn-success">

    Save User

</button>

<a
    href="/users"
    class="btn btn-secondary">

    Back

</a>

</form>

</div>

<script>

function togglePassword()
{
    let pwd =
    document.getElementById("password");

    if(pwd.type=="password")
    {
        pwd.type="text";
    }
    else
    {
        pwd.type="password";
    }
}

</script>

</body>
</html>
