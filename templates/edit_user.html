<!DOCTYPE html>
<html>
<head>
<title>Edit User</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f4f4;
}

.header{
    background:#0066cc; /* CSC Blue Theme */
    color:white;
    padding:25px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
}

.form-box{
    width:550px;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

.perm-box {
    margin-top: 20px; 
    background: #f8f9fa; 
    padding: 20px; 
    border-radius: 8px; 
    border: 1px solid #dee2e6;
}
</style>

</head>
<body>

<div class="header">
    Edit User Details
</div>

<div class="form-box">

<form method="POST">

<div class="mb-3">
    <label class="form-label"><b>Username</b></label>
    <input type="text" name="username" class="form-control" value="{{ user[1] }}" required>
</div>

<div class="mb-3">
    <label class="form-label"><b>Password</b></label>
    <input type="password" name="password" class="form-control" value="{{ user[2] }}" required>
</div>

<div class="mb-3">
    <label class="form-label"><b>Role</b></label>
    <select name="role" id="user_role" class="form-select" onchange="checkRole()">
        <option value="ADMIN" {% if user[3]=="ADMIN" %}selected{% endif %}>ADMIN</option>
        <option value="STAFF" {% if user[3]=="STAFF" %}selected{% endif %}>STAFF</option>
    </select>
</div>

<!-- Edit Staff Permission Section -->
<div class="perm-box" id="permission_section" style="{% if user[3]=='ADMIN' %}display: none;{% endif %}">
    <h5 style="margin-top: 0; color: #0066cc; font-weight: bold; border-bottom: 2px solid #ddd; padding-bottom: 8px;">
        Modify Staff Permissions
    </h5>
    
    <label style="display: block; margin-bottom: 12px; cursor: pointer;">
        <input type="checkbox" name="is_full_access" id="full_access" value="true" {% if user[7] %}checked{% endif %} onchange="toggleAllPerms(this)"> 
        <span style="color: #dc3545; font-weight: bold;">Full Access</span>
    </label>
    <hr style="margin: 10px 0;">
    
    <label style="display: block; margin-bottom: 8px; cursor: pointer;">
        <input type="checkbox" class="perm-check" name="can_view_reports" value="true" {% if user[4] or user[7] %}checked{% endif %} {% if user[7] %}disabled{% endif %}> View Reports
    </label>
    
    <label style="display: block; margin-bottom: 8px; cursor: pointer;">
        <input type="checkbox" class="perm-check" name="can_manage_services" value="true" {% if user[5] or user[7] %}checked{% endif %} {% if user[7] %}disabled{% endif %}> Manage Services
    </label>
    
    <label style="display: block; margin-bottom: 8px; cursor: pointer;">
        <input type="checkbox" class="perm-check" name="can_manage_expenses" value="true" {% if user[6] or user[7] %}checked{% endif %} {% if user[7] %}disabled{% endif %}> Track Expenses
    </label>
</div>

<div class="mt-4">
    <button type="submit" class="btn btn-warning px-4">Update User</button>
    <a href="/users" class="btn btn-secondary px-4">Back</a>
</div>

</form>

</div>

<script>
function checkRole() {
    let role = document.getElementById("user_role").value;
    let permSection = document.getElementById("permission_section");
    if(role === "ADMIN") {
        permSection.style.display = "none";
    } else {
        permSection.style.display = "block";
    }
}

function toggleAllPerms(master) {
    let checkboxes = document.getElementsByClassName('perm-check');
    for (let i = 0; i < checkboxes.length; i++) {
        checkboxes[i].checked = master.checked;
        checkboxes[i].disabled = master.checked;
    }
}

// Initial check on page load to block checkboxes if Full Access is active
window.onload = function() {
    let master = document.getElementById("full_access");
    if(master && master.checked) {
        let checkboxes = document.getElementsByClassName('perm-check');
        for (let i = 0; i < checkboxes.length; i++) {
            checkboxes[i].disabled = true;
        }
    }
}
</script>

</body>
</html>
