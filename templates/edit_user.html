<!DOCTYPE html>
<html>
<head>
<title>Edit User</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f4f4;
}

.header{
    background:#0066cc;
    color:white;
    padding:25px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
}

.form-box{
    width:550px;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}
</style>

</head>
<body>

<div class="header">
    Modify User Details
</div>

<div class="form-box">

<form method="POST">

<div class="mb-3">
    <label class="form-label"><b>Username</b></label>
    <input type="text" name="username" class="form-control" value="{{ user[1] }}" required>
</div>

<div class="mb-3">
    <label class="form-label"><b>Password</b></label>
    <input type="password" name="password" class="form-control" value="{{ user[2] }}" required>
</div>

<div class="mb-3">
    <label class="form-label"><b>System Role</b></label>
    <select name="role" id="user_role" class="form-select" onchange="checkRole()">
        <option value="ADMIN" {% if user[3]=="ADMIN" %}selected{% endif %}>ADMIN</option>
        <option value="STAFF" {% if user[3]=="STAFF" %}selected{% endif %}>STAFF</option>
    </select>
</div>

<div class="mb-3" id="feature_section" style="{% if user[3]=='ADMIN' %}display: none;{% endif %}">
    <label class="form-label"><b>Modify Permitted Dashboard Features</b></label>
    <p class="text-muted" style="font-size: 12px; margin-top:-5px;">Ctrl കീ അമർത്തിപ്പിടിച്ച് ചേഞ്ചസ് വരുത്താം</p>
    
    <select name="features[]" class="form-select" multiple style="height: 220px;">
        <option value="FULL_ACCESS" style="color: #dc3545; font-weight: bold;" {% if user[13] %}selected{% endif %}>[ Full Access / Manager ]</option>
        <option value="NEW_BILL" {% if user[4] %}selected{% endif %}>New Bill Entry (പുതിയ ബില്ലടിക്കാൻ)</option>
        <option value="ALL_BILLS" {% if user[5] %}selected{% endif %}>All Bill Reports / Search (ബില്ലുകൾ പരിശോധിക്കാൻ)</option>
        <option value="COLLECTION_REP" {% if user[6] %}selected{% endif %}>Collection Report (ഡെയിലി കളക്ഷൻ റിപ്പോർട്ട്)</option>
        <option value="DATE_REP" {% if user[7] %}selected{% endif %}>Datewise Report (തീയതി വെച്ചുള്ള റിപ്പോർട്ട്)</option>
        <option value="STAFF_REP" {% if user[8] %}selected{% endif %}>Staff Performance Report (സ്റ്റാഫ് കളക്ഷൻ റിപ്പോർട്ട്)</option>
        <option value="SERVICE_REP" {% if user[9] %}selected{% endif %}>Service-wise Report (സർവീസ് തിരിച്ചുള്ള റിപ്പോർട്ട്)</option>
        <option value="EXPENSE" {% if user[10] %}selected{% endif %}>Expense Entry / Track (ചിലവുകൾ നിയന്ത്രിക്കാൻ)</option>
        <option value="PROFIT_LOSS" {% if user[11] %}selected{% endif %}>Profit & Loss Analysis (ലാഭ നഷ്ട കണക്കുകൾ)</option>
        <option value="SERVICES_MGMT" {% if user[12] %}selected{% endif %}>Service Management (സർവീസ് റേറ്റ് മാറ്റാൻ)</option>
    </select>
</div>

<div class="mt-4">
    <button type="submit" class="btn btn-warning px-4">Update User</button>
    <a href="/users" class="btn btn-secondary px-4">Back</a>
</div>

</form>

</div>

<script>
function checkRole() {
    let role = document.getElementById("user_role").value;
    let featSection = document.getElementById("feature_section");
    if(role === "ADMIN") {
        featSection.style.display = "none";
    } else {
        featSection.style.display = "block";
    }
}
</script>

</body>
</html>
