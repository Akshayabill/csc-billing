<!DOCTYPE html>
<html>
<head>
<title>Edit User</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f4f4;
}

.header{
    background:#0d6efd;
    color:white;
    padding:25px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
}

.form-box{
    width:500px;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

</style>

</head>
<body>

<div class="header">
    Edit User
</div>

<div class="form-box">

<form method="POST">

<div class="mb-3">
<label>Username</label>
<input
type="text"
name="username"
class="form-control"
value="{{ user[1] }}"
required>
</div>

<div class="mb-3">
<label>Password</label>
<input
type="password"
name="password"
class="form-control"
value="{{ user[2] }}"
required>
</div>

<div class="mb-3">

<label>Role</label>

<select
name="role"
class="form-select">

<option value="ADMIN"
{% if user[3]=="ADMIN" %}selected{% endif %}>
ADMIN
</option>

<option value="STAFF"
{% if user[3]=="STAFF" %}selected{% endif %}>
STAFF
</option>

</select>

</div>

<button
type="submit"
class="btn btn-warning">
Update User
</button>

<a
href="/users"
class="btn btn-secondary">
Back
</a>

</form>

</div>

</body>
</html>
