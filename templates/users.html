<!DOCTYPE html>
<html>
<head>
    <title>User Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f4f4;
        }

        .header{
            background:#0d6efd;
            color:white;
            padding:25px;
            text-align:center;
            font-size:32px;
            font-weight:bold;
        }

        .card-box{
            background:white;
            padding:25px;
            margin-top:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }
    </style>

</head>
<body>

<div class="header">
    User Management
</div>

<div class="container">

    <div class="card-box">

        <a href="/add_user" class="btn btn-success mb-3">
            + Add User
        </a>

        <table class="table table-bordered table-striped">

            <tr>
                <th>Sl No</th>
                <th>Username</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>

            {% for user in users %}

            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ user[1] }}</td>
                <td>{{ user[2] }}</td>
                <td>

                    <a
                        href="/edit_user/{{ user[0] }}"
                        class="btn btn-warning btn-sm">
                        Edit
                    </a>

                    {% if user[1].lower() != "admin" and user[2].upper() != "ADMIN" %}

                    <a
                        href="/delete_user/{{ user[0] }}"
                        class="btn btn-danger btn-sm"
                        onclick="return confirm('Delete this user?')">
                        Delete
                    </a>

                    {% endif %}

                </td>
            </tr>

            {% endfor %}

        </table>

        <a href="/dashboard" class="btn btn-primary">
            Back
        </a>

    </div>

</div>

</body>
</html>
